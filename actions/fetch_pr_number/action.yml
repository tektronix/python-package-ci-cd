---
name: Fetch PR Number
description: Find the PR number for the provided SHA. This action also works for PRs
  that are from forks.
inputs:
  sha:
    description: The SHA of the commit to find the PR number for.
    required: true
  github-repository:
    description: The GitHub repository to search for the PR in.
    required: true
  retry-delay:
    description: The delay in seconds between retries.
    default: '120'
    required: false
  max-attempts:
    description: The maximum number of attempts to find the PR number.
    default: '5'
    required: false
outputs:
  number:
    description: The PR number.
    value: ${{ steps.fetch-pr.outputs.result }}
runs:
  using: composite
  steps:
    - name: Fetch PR number
      id: fetch-pr
      uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3  # v9.0.0
      with:
        script: |-
          const maxAttempts = ${{ inputs.max-attempts }};
          const retryDelaySeconds = ${{ inputs.retry-delay }};
          const sha = '${{ inputs.sha }}';
          const repository = '${{ inputs.github-repository }}';
          const [owner, repo] = repository.split('/');
          let attempt = 0;
          let pullRequestNumber;
          // Helper: normalize a PR-like object into our common shape.
          const normalize = (pr) => ({
            number: pr.number,
            state: (pr.state || '').toLowerCase(),
            updated_at: pr.updated_at || pr.updatedAt,
          });
          // GraphQL: ask the repository for the commit object and its
          // associatedPullRequests. This is the most reliable lookup because
          // GitHub stores commits across forks in a shared object database, so
          // it resolves:
          //   - normal commits on the base repo's branches,
          //   - PR merge-ref commits (refs/pull/N/merge), and
          //   - commits that originated on a fork.
          // It replaces the deprecated REST search.issuesAndPullRequests
          // endpoint which previously powered this action.
          const associatedPullRequestsQuery = `
            query($owner: String!, $repo: String!, $sha: GitObjectID!) {
              repository(owner: $owner, name: $repo) {
                object(oid: $sha) {
                  ... on Commit {
                    associatedPullRequests(first: 100) {
                      nodes {
                        number
                        state
                        updatedAt
                        baseRepository { nameWithOwner }
                      }
                    }
                  }
                }
              }
            }`;
          while (attempt < maxAttempts) {
            try {
              // Collect candidate PRs from multiple sources, then pick the
              // best one. We do NOT return immediately on the first source
              // that yields a result, because GitHub's authoritative
              // commit-to-PR attribution can point at the OLDEST PR that
              // introduced the commit, while callers typically want the
              // NEWEST PR that currently contains it on its branch (e.g.
              // when a later PR was rebased on top of an earlier one from
              // the same fork).
              const candidatesByNumber = new Map(); // number -> normalized PR
              const addCandidate = (pr) => {
                const n = normalize(pr);
                if (typeof n.number === 'number' && !candidatesByNumber.has(n.number)) {
                  candidatesByNumber.set(n.number, n);
                }
              };
              // 1. GraphQL associatedPullRequests on the commit object.
              try {
                const graphqlResponse = await github.graphql(
                  associatedPullRequestsQuery,
                  { owner, repo, sha }
                );
                const commit = graphqlResponse.repository && graphqlResponse.repository.object;
                const nodes = (commit && commit.associatedPullRequests && commit.associatedPullRequests.nodes) || [];
                nodes
                  .filter(n => n && typeof n.number === 'number')
                  // Only keep PRs whose base is the repository we care about.
                  .filter(n => !n.baseRepository
                    || (n.baseRepository.nameWithOwner || '').toLowerCase() === repository.toLowerCase())
                  .forEach(addCandidate);
              } catch (graphqlError) {
                console.warn(`GraphQL associatedPullRequests lookup failed:`, graphqlError.message);
              }
              // 2. REST: list PRs associated with the commit. Often returns
              //    the same set as (1) but occasionally surfaces additional
                //    PRs (or vice versa).
              try {
                const restResponse = await github.rest.repos.listPullRequestsAssociatedWithCommit({
                  owner,
                  repo,
                  commit_sha: sha,
                  per_page: 100,
                });
                restResponse.data.forEach(addCandidate);
              } catch (restError) {
                console.warn(`REST associated-PRs lookup failed:`, restError.message);
              }
              let prs = Array.from(candidatesByNumber.values());
              // 3. Final fallback: if neither (1) nor (2) found anything,
              //    paginate through PRs (newest first) and match the SHA
              //    against each PR's head.sha or merge_commit_sha. This
              //    catches commits that only exist on `refs/pull/N/head`
              //    after a squash-merge dropped them from the base branch
              //    (typical for merged Dependabot PRs and merged fork PRs).
              //
              //    For PRs from forks whose current head.sha doesn't match
              //    (e.g. when looking for an *intermediate* commit on the
              //    fork branch, not the latest head or the squash-merge),
              //    collect the PR as a fork candidate and inspect its
              //    commit list via pulls.listCommits below.
              const forkCandidates = [];
              if (prs.length < 1) {
                const baseRepoLower = repository.toLowerCase();
                // Quick pass scans up to maxQuickPages*100 PRs on head/merge SHA.
                const maxQuickPages = 50; // up to 5000 PRs scanned in the cheap pass
                try {
                  const iterator = github.paginate.iterator(github.rest.pulls.list, {
                    owner,
                    repo,
                    state: 'all',
                    sort: 'updated',
                    direction: 'desc',
                    per_page: 100,
                  });
                  let page = 0;
                  outer: for await (const { data } of iterator) {
                    page++;
                    for (const pr of data) {
                      const headSha = pr.head && pr.head.sha;
                      if (headSha === sha || pr.merge_commit_sha === sha) {
                        prs = [normalize(pr)];
                        break outer;
                      }
                      const headRepoFullName =
                        (pr.head && pr.head.repo && pr.head.repo.full_name) || '';
                      if (headRepoFullName
                        && headRepoFullName.toLowerCase() !== baseRepoLower) {
                        forkCandidates.push(pr);
                      }
                    }
                    if (page >= maxQuickPages) {
                      break;
                    }
                  }
                } catch (paginateError) {
                  console.warn(`PR pagination lookup failed:`, paginateError.message);
                }
              }
              // 4. Decide whether to deep-inspect commit lists to pick the
              //    best PR among multiple candidates.
              //
              //    Trigger conditions:
              //    a. We have multiple candidates from steps 1/2 — same
              //       commit attributed to several PRs by GitHub.
              //    b. We have a single candidate from steps 1/2 but it's a
              //       FORK PR — newer fork PRs (rebased on top of an older
              //       one from the same fork) often share commits with the
              //       older PR, but GitHub's commit-to-PR index points only
              //       at the older PR. We need to look forward at newer
              //       fork PRs to find a longer commit list containing the
              //       same SHA.
              //    c. Steps 1/2 found nothing and step 3's quick pass
              //       collected fork candidates.
              //
              //    The same commit can appear in multiple PRs when their
              //    branches share history. We prefer the PR with the
              //    LONGEST commit list containing the SHA — that PR is a
              //    superset of the others and is the most specific / most
              //    recent owner of the commit. Tiebreaker: highest PR
              //    number.
              const maxDeepInspect = 200; // cap on listCommits calls
              const baseRepoLowerForFork = repository.toLowerCase();
              // Determine if the single candidate from steps 1/2 is a fork PR.
              let singleCandidateIsFork = false;
              if (prs.length === 1) {
                try {
                  const detail = await github.rest.pulls.get({
                    owner, repo, pull_number: prs[0].number,
                  });
                  const headRepo = detail.data.head && detail.data.head.repo
                    && detail.data.head.repo.full_name;
                  if (headRepo
                    && headRepo.toLowerCase() !== baseRepoLowerForFork) {
                    singleCandidateIsFork = true;
                  }
                } catch (_) { /* ignore */ }
              }
              const needsDeepInspect = prs.length > 1
                || singleCandidateIsFork
                || (prs.length < 1 && forkCandidates.length > 0);
              if (needsDeepInspect) {
                // Build the inspection pool.
                let poolNumbers;
                if (prs.length >= 1) {
                  // Start with the existing candidate(s) and ALSO scan newer
                  // fork PRs (higher numbers) so we can find a superset PR.
                  const existingNumbers = new Set(prs.map(p => p.number));
                  poolNumbers = Array.from(existingNumbers);
                  try {
                    const iterator = github.paginate.iterator(github.rest.pulls.list, {
                      owner, repo,
                      state: 'all',
                      sort: 'created',
                      direction: 'desc',
                      per_page: 100,
                    });
                    let scanned = 0;
                    const minExisting = Math.min(...existingNumbers);
                    outerScan: for await (const { data } of iterator) {
                      for (const pr of data) {
                        scanned++;
                        if (pr.number <= minExisting) {
                          // Older than every existing candidate; nothing
                          // useful below this point for finding a superset.
                          break outerScan;
                        }
                        if (existingNumbers.has(pr.number)) continue;
                        // Only consider fork PRs as additional candidates.
                        const headRepoFullName =
                          (pr.head && pr.head.repo && pr.head.repo.full_name) || '';
                        if (headRepoFullName
                          && headRepoFullName.toLowerCase() !== baseRepoLowerForFork) {
                          poolNumbers.push(pr.number);
                          if (poolNumbers.length >= maxDeepInspect) break outerScan;
                        }
                        if (scanned >= 500) break outerScan;
                      }
                    }
                  } catch (scanError) {
                    console.warn(`Newer-fork-PR scan failed:`, scanError.message);
                  }
                } else {
                  poolNumbers = forkCandidates
                    .slice(0, maxDeepInspect)
                    .map(p => p.number);
                }
                const matches = []; // { number, normalized, totalCount, isHead, isLast }
                for (const prNumber of poolNumbers.slice(0, maxDeepInspect)) {
                  try {
                    const detail = await github.rest.pulls.get({
                      owner, repo, pull_number: prNumber,
                    });
                    const prObj = detail.data;
                    const commitsIterator = github.paginate.iterator(
                      github.rest.pulls.listCommits,
                      { owner, repo, pull_number: prNumber, per_page: 100 }
                    );
                    let matched = false;
                    let totalCount = 0;
                    let lastCommitSha = null;
                    for await (const { data } of commitsIterator) {
                      totalCount += data.length;
                      if (data.length > 0) {
                        lastCommitSha = data[data.length - 1].sha;
                      }
                      if (!matched && data.some(c => c.sha === sha)) {
                        matched = true;
                      }
                    }
                    if (matched) {
                      const isHead = !!(prObj && prObj.head && prObj.head.sha === sha);
                      const isLast = lastCommitSha === sha;
                      matches.push({
                        number: prNumber,
                        normalized: normalize(prObj),
                        totalCount,
                        isHead,
                        isLast,
                      });
                    }
                  } catch (commitsError) {
                    console.warn(`pulls.listCommits failed for PR #${prNumber}:`, commitsError.message);
                  }
                }
                if (matches.length > 0) {
                  matches.sort((a, b) => {
                    // Strongest signal: PR's current head equals the SHA.
                    if (a.isHead !== b.isHead) return a.isHead ? -1 : 1;
                    // Next: PR where the SHA is the last commit in its list.
                    if (a.isLast !== b.isLast) return a.isLast ? -1 : 1;
                    // Next: PR with the LONGEST commit list (superset wins).
                    if (a.totalCount !== b.totalCount) return b.totalCount - a.totalCount;
                    // Finally: highest PR number (newest wins).
                    return b.number - a.number;
                  });
                  prs = [matches[0].normalized];
                }
              }
              if (prs.length < 1) {
                throw new Error(`No PRs found for commit ${sha}`);
              }
              const selectedPr = prs[0];
              pullRequestNumber = selectedPr.number;
              console.info("Pull request number is", pullRequestNumber);
              break; // Exit loop on success
            } catch (error) {
              console.error(`Attempt ${attempt + 1} failed:`, error.message);
              if (attempt < maxAttempts - 1) { // Check if not last attempt
                console.log(`Waiting for ${retryDelaySeconds} seconds before retrying...`);
                await new Promise(resolve => setTimeout(resolve, retryDelaySeconds * 1000));
              }
            }
            attempt++;
          }
          if (!pullRequestNumber) {
            core.setFailed(`Failed to fetch PR number after ${maxAttempts} attempts`);
          }
          return pullRequestNumber;
