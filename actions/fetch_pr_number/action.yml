---
name: Fetch PR Number
description: Find the PR number for the provided SHA. This action also works for PRs
  that are from forks.
inputs:
  sha:
    description: The SHA of the commit to find the PR number for.
    required: true
  github-repository:
    description: The GitHub repository to search for the PR in.
    required: true
  retry-delay:
    description: The delay in seconds between retries.
    default: '120'
    required: false
  max-attempts:
    description: The maximum number of attempts to find the PR number.
    default: '5'
    required: false
outputs:
  number:
    description: The pull request number.
    value: ${{ steps.fetch-pr.outputs.result }}
runs:
  using: composite
  steps:
    - name: Fetch PR number
      id: fetch-pr
      uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3  # v9.0.0
      env:
        INPUT_SHA: ${{ inputs.sha }}
        INPUT_REPO: ${{ inputs.github-repository }}
        INPUT_RETRY_DELAY: ${{ inputs.retry-delay }}
        INPUT_MAX_ATTEMPTS: ${{ inputs.max-attempts }}
      with:
        script: |-
          const sha = process.env.INPUT_SHA;
          const repoFull = process.env.INPUT_REPO;
          const maxAttempts = Number(process.env.INPUT_MAX_ATTEMPTS ?? '5');
          const retryDelaySec = Number(process.env.INPUT_RETRY_DELAY ?? '120');
          if (!sha) core.setFailed('Missing input: sha');
          if (!repoFull || !repoFull.includes('/')) {
            core.setFailed(`Invalid github-repository: "${repoFull}"`);
          }
          if (!Number.isFinite(maxAttempts) || maxAttempts < 1) {
            core.setFailed(`Invalid max-attempts: "${process.env.INPUT_MAX_ATTEMPTS}"`);
          }
          if (!Number.isFinite(retryDelaySec) || retryDelaySec < 0) {
            core.setFailed(`Invalid retry-delay: "${process.env.INPUT_RETRY_DELAY}"`);
          }
          const [owner, repo] = repoFull.split('/');
          let pullRequestNumber;
          for (let attempt = 1; attempt <= maxAttempts; attempt++) {
            try {
              core.info(
                `Attempt ${attempt}/${maxAttempts}: looking up PR for ${owner}/${repo}@${sha}`
              );
              // Try: get commit details to find associated PRs
              core.debug(`Trying listPullRequestsAssociatedWithCommit`);
              try {
                const response =
                  await github.rest.repos.listPullRequestsAssociatedWithCommit({
                    owner,
                    repo,
                    commit_sha: sha,
                    per_page: 1,
                  });
                if (response.data && response.data.length > 0) {
                  pullRequestNumber = response.data[0].number;
                  core.info(`Found PR #${pullRequestNumber} via commit association`);
                  break;
                }
              } catch (e) {
                core.debug(`Commit association failed: ${e.message}`);
              }
              // Fallback: search by commit SHA
              core.debug(`Trying search by SHA`);
              try {
                const searchResponse = await github.rest.search.issuesAndPullRequests({
                  q: `repo:${owner}/${repo} is:pr sha:${sha}`,
                  per_page: 1,
                });
                if (searchResponse.data && searchResponse.data.items && searchResponse.data.items.length > 0) {
                  pullRequestNumber = searchResponse.data.items[0].number;
                  core.info(`Found PR #${pullRequestNumber} via search`);
                  break;
                }
              } catch (e) {
                core.debug(`Search by SHA failed: ${e.message}`);
              }
              // Second fallback: list all PRs and check head commits
              core.debug(`Trying to find PR by listing and matching head commits`);
              const allPRsResponse = await github.rest.pulls.list({
                owner,
                repo,
                state: 'open',
                sort: 'updated',
                direction: 'desc',
                per_page: 100,
              });
              if (allPRsResponse.data) {
                for (const pr of allPRsResponse.data) {
                  if (pr.head.sha === sha) {
                    pullRequestNumber = pr.number;
                    core.info(`Found PR #${pullRequestNumber} by matching head commit`);
                    break;
                  }
                }
                if (pullRequestNumber) break;
              }
              // Check closed/merged PRs if not found in open
              core.debug(`Trying closed PRs`);
              const closedPRsResponse = await github.rest.pulls.list({
                owner,
                repo,
                state: 'closed',
                sort: 'updated',
                direction: 'desc',
                per_page: 100,
              });
              if (closedPRsResponse.data) {
                for (const pr of closedPRsResponse.data) {
                  if (pr.head.sha === sha) {
                    pullRequestNumber = pr.number;
                    core.info(`Found PR #${pullRequestNumber} by matching head commit (closed)`);
                    break;
                  }
                }
                if (pullRequestNumber) break;
              }
              throw new Error('No PRs associated with commit');
            } catch (err) {
              core.warning(`Attempt ${attempt} failed: ${err.message}`);
              if (attempt < maxAttempts) {
                core.info(`Waiting ${retryDelaySec} seconds before retrying...`);
                await new Promise(r => setTimeout(r, retryDelaySec * 1000));
              }
            }
          }
          if (!pullRequestNumber) {
            core.setFailed(
              `Failed to fetch PR number after ${maxAttempts} attempts`
            );
          }
          return pullRequestNumber;
